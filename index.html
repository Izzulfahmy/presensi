<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Presensi PPL</title>
  <link rel="icon" href="logo.png" type="image/png">
  <style>
    body, html { 
      margin: 0; 
      padding: 0; 
      height: 100%; 
      overflow: hidden; 
      background-color: #f8fafc; 
    }
    iframe { 
      width: 100%; 
      height: 100%; 
      border: none; 
    }
  </style>
</head>
<body>
  
  <iframe id="appFrame" allow="geolocation"></iframe>

  <script>
    // 1. URL dasar Google Apps Script Anda
    const gasUrl = "https://script.google.com/macros/s/AKfycby4XG7X3yglhH9b9RSAYB5lUR5aeQGeNAKd_RXOsXRW6TguZPIwyBQoCMxB5nLj757N/exec";
    
    // 2. Tangkap parameter / embel-embel dari URL Vercel (contoh: ?vid=XYZ123)
    const urlParams = window.location.search;
    
    // 3. Gabungkan URL Google Script dengan parameter tersebut, lalu masukkan ke Iframe
    document.getElementById('appFrame').src = gasUrl + urlParams;
  </script>

</body>
</html>
